# Starter pipeline
trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: DownloadSecureFile@1
  name: sshKey
  inputs:
    secureFile: id_ed25519

- task: Bash@3
  displayName: 'Pull from GitHub and Push to Azure Repos'
  inputs:
    targetType: 'inline'
    script: |
      set -e

      echo "========================================="
      echo "START: GitHub to Azure Repos Sync"
      echo "========================================="

      # ── SSH Setup ──────────────────────────────────
      echo "Setting up SSH key..."
      mkdir -p ~/.ssh
      cp $(sshKey.secureFilePath) ~/.ssh/id_ed25519
      chmod 600 ~/.ssh/id_ed25519
      chmod 700 ~/.ssh

      # GitHub fingerprint trust karo
      ssh-keyscan github.com >> ~/.ssh/known_hosts
      chmod 644 ~/.ssh/known_hosts

      echo "SSH setup complete."

      # ── Clone GitHub Repo ──────────────────────────
      echo "Cloning from GitHub..."
      git clone --mirror git@github.com:Anuss2731/bashscripting.notes.git repo_mirror
      cd repo_mirror

      echo "GitHub clone done."

      # ── Push to Azure Repos ────────────────────────
      echo "Pushing to Azure Repos..."
      git push --mirror https://$(System.AccessToken)@tzaroon.visualstudio.com/Anus-Practice/_git/git-repo

      echo "========================================="
      echo "DONE: Code pushed to Azure Repos"
      echo "========================================="
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)