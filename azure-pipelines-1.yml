# Starter pipeline
trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: DownloadSecureFile@1
  name: sshKey
  inputs:
    secureFile: id_ed25519

- task: Bash@3
  displayName: 'Pull from GitHub and Push to Azure Repos'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  inputs:
    targetType: 'inline'
    script: |
      set -e

      echo "========================================="
      echo "START: GitHub to Azure Repos Sync"
      echo "========================================="

      # ── SSH Setup ──────────────────────────────
      echo "Setting up SSH key..."
      mkdir -p ~/.ssh
      cp $(sshKey.secureFilePath) ~/.ssh/id_ed25519
      chmod 600 ~/.ssh/id_ed25519
      chmod 700 ~/.ssh
      ssh-keyscan github.com >> ~/.ssh/known_hosts
      chmod 644 ~/.ssh/known_hosts
      echo "SSH setup complete."

      # ── Clone GitHub ────────────────────────────
      echo "Cloning from GitHub..."
      git clone --mirror git@github.com:Anuss2731/bashscripting.notes.git repo_mirror
      cd repo_mirror
      echo "GitHub clone done."

      # ── Token Check ─────────────────────────────
      if [ -z "$SYSTEM_ACCESSTOKEN" ]; then
        echo "❌ Token is EMPTY - OAuth not enabled!"
        exit 1
      else
        echo "✅ Token present - length: ${#SYSTEM_ACCESSTOKEN} chars"
      fi

      # ── Test repo access before pushing ─────────
      echo "Testing repo access..."
      git ls-remote https://pipeline-user:$SYSTEM_ACCESSTOKEN@tzaroon.visualstudio.com/Anus-Practice/_git/git-repo
      echo "✅ Repo access confirmed."

      # ── Push to Azure Repos ──────────────────────
      echo "Pushing to Azure Repos..."
      git push --mirror https://pipeline-user:$SYSTEM_ACCESSTOKEN@tzaroon.visualstudio.com/Anus-Practice/_git/git-repo

      echo "========================================="
      echo "DONE: Code synced to Azure Repos ✅"
      echo "========================================="
- task: Bash@3
  displayName: 'Find Repo Name'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  inputs:
    targetType: 'inline'
    script: |
      curl -s -u ":$SYSTEM_ACCESSTOKEN" \
        "https://dev.azure.com/tzaroon/Anus-Practice/_apis/git/repositories?api-version=7.0" \
        | python3 -c "
import sys, json
data = json.load(sys.stdin)
for r in data.get('value', []):
    print('Repo Name:', r['git-repo'])
    print('Clone URL:', r['https://tzaroon.visualstudio.com/Anus-Practice/_git/git-repo'])
    print('---')
"    